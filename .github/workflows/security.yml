name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  dependency-audit:
    name: Dependency CVE Scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit and uv
        run: pip install pip-audit uv
      - name: Audit dependencies
        run: |
          uv export --frozen --no-dev --no-emit-project --format requirements-txt > /tmp/requirements.txt 2>/dev/null || pip install -e ".[globus,dev]" && pip-audit --progress-spinner off && exit 0
          pip-audit -r /tmp/requirements.txt --progress-spinner off

  static-analysis:
    name: Static Security Analysis (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install bandit[toml]
      - name: Run bandit
        run: |
          bandit -r hpc_as_api/ \
            --severity-level medium \
            --confidence-level medium

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
      - name: Run gitleaks
        run: gitleaks detect --source . --log-opts="--all" --redact --exit-code 1
